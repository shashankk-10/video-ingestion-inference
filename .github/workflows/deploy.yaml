name: Build & Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: optifye-eks

permissions:
  id-token: write
  contents: read

jobs:
  # ── Build and push all container images in parallel ──
  build-inference:
    name: Build inference-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/build-push-action@v5
        with:
          context: inference-service
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/optifye/inference-service:${{ github.sha }},${{ steps.ecr.outputs.registry }}/optifye/inference-service:latest

  build-consumer:
    name: Build kafka-consumer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/build-push-action@v5
        with:
          context: kafka-consumer
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/optifye/kafka-consumer:${{ github.sha }},${{ steps.ecr.outputs.registry }}/optifye/kafka-consumer:latest

  build-producer:
    name: Build frame-producer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/build-push-action@v5
        with:
          context: frame-producer
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/optifye/frame-producer:${{ github.sha }},${{ steps.ecr.outputs.registry }}/optifye/frame-producer:latest

  # ── Deploy to EKS after all images are built ──
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-inference, build-consumer, build-producer]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Generate manifests from templates
        run: |
          cd terraform && terraform output -json > ../tf-outputs.json && cd ..

          ACCOUNT_ID=$(jq -r '.account_id.value' tf-outputs.json)
          MSK_BROKERS=$(jq -r '.msk_bootstrap_brokers.value' tf-outputs.json)
          S3_BUCKET=$(jq -r '.s3_bucket_name.value' tf-outputs.json)
          RTSP_IP=$(jq -r '.rtsp_instance_private_ip.value' tf-outputs.json)

          cp -r k8s k8s-generated

          sed -i "s|<MSK_BOOTSTRAP_BROKERS>|$MSK_BROKERS|g" k8s-generated/configmap.yaml
          sed -i "s|<RTSP_PRIVATE_IP>|$RTSP_IP|g"           k8s-generated/configmap.yaml
          sed -i "s|<S3_BUCKET_NAME>|$S3_BUCKET|g"           k8s-generated/configmap.yaml
          sed -i "s|<ACCOUNT_ID>|$ACCOUNT_ID|g"              k8s-generated/inference-deployment.yaml
          sed -i "s|<ACCOUNT_ID>|$ACCOUNT_ID|g"              k8s-generated/consumer-deployment.yaml
          sed -i "s|<ACCOUNT_ID>|$ACCOUNT_ID|g"              k8s-generated/producer-deployment.yaml
          sed -i "s|<MSK_BOOTSTRAP_BROKERS>|$MSK_BROKERS|g"  k8s-generated/keda-scaledobject.yaml

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s-generated/configmap.yaml
          kubectl apply -f k8s-generated/inference-deployment.yaml
          kubectl rollout status deployment/inference-service --timeout=180s
          kubectl apply -f k8s-generated/consumer-deployment.yaml
          kubectl apply -f k8s-generated/producer-deployment.yaml

      - name: Apply KEDA autoscalers
        continue-on-error: true
        run: kubectl apply -f k8s-generated/keda-scaledobject.yaml

      - name: Restart deployments with new images
        run: |
          kubectl rollout restart deployment/inference-service
          kubectl rollout restart deployment/kafka-consumer
          kubectl rollout restart deployment/frame-producer
          kubectl rollout status deployment/inference-service --timeout=180s
