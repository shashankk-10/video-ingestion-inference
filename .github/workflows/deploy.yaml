name: Build And Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: optifye-eks

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: inference-service
            context: inference-service
            repository: optifye/inference-service
          - name: kafka-consumer
            context: kafka-consumer
            repository: optifye/kafka-consumer
          - name: frame-producer
            context: frame-producer
            repository: optifye/frame-producer
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC role)
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys fallback)
        if: ${{ secrets.AWS_ROLE_ARN == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate AWS auth config
        if: ${{ secrets.AWS_ROLE_ARN == '' && (secrets.AWS_ACCESS_KEY_ID == '' || secrets.AWS_SECRET_ACCESS_KEY == '') }}
        run: |
          echo "Missing AWS credentials for CI/CD."
          echo "Set either AWS_ROLE_ARN (OIDC) OR AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY."
          exit 1

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service.repository }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ matrix.service.repository }}:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC role)
        if: ${{ secrets.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (access keys fallback)
        if: ${{ secrets.AWS_ROLE_ARN == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate AWS auth config
        if: ${{ secrets.AWS_ROLE_ARN == '' && (secrets.AWS_ACCESS_KEY_ID == '' || secrets.AWS_SECRET_ACCESS_KEY == '') }}
        run: |
          echo "Missing AWS credentials for CI/CD."
          echo "Set either AWS_ROLE_ARN (OIDC) OR AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY."
          exit 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER }}" --region "${{ env.AWS_REGION }}"

      - name: Generate manifests from templates
        run: |
          set -euo pipefail
          cd terraform
          terraform output -json > ../tf-outputs.json
          cd ..

          ACCOUNT_ID=$(jq -r '.account_id.value' tf-outputs.json)
          MSK_BROKERS=$(jq -r '.msk_bootstrap_brokers.value' tf-outputs.json)
          S3_BUCKET=$(jq -r '.s3_bucket_name.value' tf-outputs.json)
          RTSP_IP=$(jq -r '.rtsp_instance_private_ip.value' tf-outputs.json)

          if [[ "$MSK_BROKERS" == *":9092"* ]]; then
            echo "ERROR: Plaintext MSK brokers detected (:9092). Refresh Terraform outputs after TLS migration."
            exit 1
          fi

          rm -rf k8s-generated
          cp -r k8s k8s-generated

          sed -i "s|<MSK_BOOTSTRAP_BROKERS>|$MSK_BROKERS|g" k8s-generated/configmap.yaml
          sed -i "s|<RTSP_PRIVATE_IP>|$RTSP_IP|g"           k8s-generated/configmap.yaml
          sed -i "s|<S3_BUCKET_NAME>|$S3_BUCKET|g"          k8s-generated/configmap.yaml
          sed -i "s|<ACCOUNT_ID>|$ACCOUNT_ID|g"             k8s-generated/inference-deployment.yaml
          sed -i "s|<ACCOUNT_ID>|$ACCOUNT_ID|g"             k8s-generated/consumer-deployment.yaml
          sed -i "s|<ACCOUNT_ID>|$ACCOUNT_ID|g"             k8s-generated/producer-deployment.yaml
          sed -i "s|<MSK_BOOTSTRAP_BROKERS>|$MSK_BROKERS|g" k8s-generated/keda-scaledobject.yaml

      - name: Apply manifests
        run: |
          set -euo pipefail
          kubectl apply -f k8s-generated/configmap.yaml
          kubectl apply -f k8s-generated/inference-deployment.yaml
          kubectl apply -f k8s-generated/consumer-deployment.yaml
          kubectl apply -f k8s-generated/producer-deployment.yaml
          kubectl rollout status deployment/inference-service --timeout=300s
          kubectl rollout status deployment/kafka-consumer --timeout=300s
          kubectl rollout status deployment/frame-producer --timeout=300s

      - name: Apply KEDA autoscalers
        continue-on-error: true
        run: kubectl apply -f k8s-generated/keda-scaledobject.yaml

      - name: Post deploy checks
        run: |
          kubectl get pods -n default -o wide
          if ! kubectl top nodes >/dev/null 2>&1; then
            echo "WARNING: metrics-server not available; kubectl top is disabled."
          fi
