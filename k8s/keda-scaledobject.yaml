# ── KEDA: Scale kafka-consumer based on Kafka consumer group lag ──
# The consumer is the Kafka reader — scaling it reduces lag directly.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: consumer-scaler
spec:
  scaleTargetRef:
    name: kafka-consumer
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: "<MSK_BOOTSTRAP_BROKERS>"
        consumerGroup: "inference-consumer-group"
        topic: "video-stream-1"
        lagThreshold: "50"
        offsetResetPolicy: "earliest"
---
# ── KEDA: Scale inference-service based on Kafka consumer group lag ──
# When Kafka lag grows, inference is the bottleneck — scale it up to
# handle the increased batch volume from consumers.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: inference-scaler
spec:
  scaleTargetRef:
    name: inference-service
  pollingInterval: 15
  cooldownPeriod: 120
  minReplicaCount: 1
  maxReplicaCount: 4
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: "<MSK_BOOTSTRAP_BROKERS>"
        consumerGroup: "inference-consumer-group"
        topic: "video-stream-1"
        lagThreshold: "100"
        offsetResetPolicy: "earliest"
